# LibreChat OCI SQL Explorer Configuration
# For more information, see: https://www.librechat.ai/docs/configuration/librechat_yaml

# Configuration version (required)
version: 1.3.6

# Cache settings
cache: true

# Interface configuration
interface:
  endpointsMenu: true
  modelSelect: true
  parameters: true
  sidePanel: true
  presets: true
  agents:
    use: true
    create: true
    share: false
    public: false

# MCP Server domain restrictions for remote transports
# Allow localhost for SQLcl MCP Server connection
mcpSettings:
  allowedDomains:
    - 'localhost'
    - 'host.docker.internal'

# MCP Server Configuration (stdio transport)
mcpServers:
  SQLcl_conn1:
    type: stdio
    command: /Users/ashukum/sqlcl/sqlcl/bin/sql
    args:
      - "-mcp"

# Custom endpoint configuration for LiteLLM proxy
endpoints:
  custom:
    - name: "OCI GenAI"
      apiKey: "${LITELLM_MASTER_KEY}"
      baseURL: "http://localhost:4000"
      models:
        default: ["oci-genai"]
      titleConvo: true
      titleModel: "oci-genai"
      modelDisplayLabel: "OCI GenAI"
      streamRate: 0
  agents:
    disableStreaming: true
    allowedProviders:
      - "OCI GenAI"
